<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>3級 Day 39 Common Phrases Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4a90e2; --bg: #f0f4f8; --white: #ffffff; --success: #34c759; --error: #d0021b; --selected: #ffcc00; }
    html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Nunito', 'Kosugi Maru', sans-serif; }
    
    .browser-view { width: 90%; max-width: 800px; margin: 40px auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; display: flex; justify-content: flex-end; align-items: center; }
    .header h1 { font-size: 22px; color: var(--primary); margin: 0; }
    
    .question-text { font-size: 19px; line-height: 1.7; margin-bottom: 20px; color: #333; min-height: 4em; }
    .blank-space { color: var(--error); font-weight: bold; border-bottom: 2px solid #333; padding: 0 10px; display: inline-block; min-width: 180px; text-align: center; }
    
    .hint-box { font-size: 14px; color: #555; font-style: italic; margin-bottom: 20px; background: #f1f5f9; padding: 8px 12px; border-radius: 4px; display: inline-block; border-left: 3px solid #cbd5e1; }
    .hint-box:empty { display: none; }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .option-btn { padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 16px; transition: all 0.2s; text-align: left; }
    .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
    .option-btn.selected-wrong { background: #fee2e2; border-color: var(--error); color: var(--error); cursor: not-allowed; }
    .option-btn.selected-correct { background: var(--success); color: white; border-color: var(--success); }

    .controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    #feedback { font-weight: bold; font-size: 18px; height: 1.5em; }
    #next-btn { padding: 12px 40px; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; display: none; }
    .progress { font-size: 14px; color: #666; margin-right: auto; }

    .nav-btns-fixed { position: fixed; top: 15px; left: 15px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
    .fixed-btn { padding: 10px 15px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

    #print-content { display: none; }

    @media print {
      body { background: white; }
      .browser-view, .nav-btns-fixed { display: none !important; }
      #print-content { display: block !important; padding: 5mm; }
      .print-page { page-break-after: always; color: #000; }
      .print-header { border-bottom: 1.5px solid #000; margin-bottom: 4mm; display: flex; justify-content: flex-end; }
      .print-header h1 { font-size: 17px; margin: 0; }
      .instruction { font-size: 12.5px; font-weight: bold; margin-bottom: 5mm; border-left: 3px solid #000; padding-left: 10px; }
      .print-question { font-size: 15px; line-height: 1.8; margin-bottom: 7mm; }
      .print-blank { display: inline-block; width: 220px; border-bottom: 1px solid #000; margin: 0 5px; vertical-align: bottom; }
      .print-options-list { font-size: 12px; margin-top: 3px; font-style: italic; font-weight: bold; color: #444; }
      .notes-container { border-top: 1.2px solid #000; margin-top: 5mm; padding-top: 3mm; font-size: 11px; display: flex; flex-wrap: wrap; gap: 2px 15px; }
      .notes-item b { color: #000; }
    }
  </style>
</head>
<body>

<div class="nav-btns-fixed">
  <button class="fixed-btn" onclick="window.print()">PDF保存 / 印刷</button>
  <button class="fixed-btn" onclick="location.reload()" style="background:#ff9500;">最初から解く</button>
</div>

<div class="browser-view">
  <div class="header">
    <div class="progress">Question <span id="current-idx">1</span> / 16</div>
    <h1>3級 Day 39 Common Phrases</h1>
  </div>
  
  <div class="quiz-area">
    <div class="question-text" id="q-text"></div>
    <div class="hint-box" id="q-hint"></div>
    <div class="options-grid" id="q-options"></div>
  </div>

  <div class="controls">
    <div id="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<div id="print-content">
  <div class="print-page">
    <div class="print-header"><h1>3級 Day 39 Common Phrases</h1></div>
    <div class="instruction">★ Complete the sentences using the best phrase from the choices.</div>
    <div id="print-list-1"></div>
  </div>
  <div class="print-page">
    <div style="margin-top: 10mm;" id="print-list-2"></div>
    <div id="print-notes" class="notes-container"></div>
  </div>
</div>

<script>
const quizDataRaw = [
  { 
    q: "George: What are you doing ______? <br> Timothy: I have soccer practice.", 
    ans: "after school", 
    dummy: ["at home", "at first", "far away"], 
    note: "Timothy is in the soccer club." 
  },
  { 
    q: "English is spoken by people ______. It is an important language for communication.", 
    ans: "all over the world", 
    dummy: ["far away", "at home", "a little"], 
    note: "" 
  },
  { 
    q: "Anne: “Where is your brother, Timothy?” <br>Timothy: “He’s ______. Look! He's waving at us!”", 
    ans: "over there", 
    dummy: ["at all", "a little", "all day"], 
    note: "" 
  },
  { 
    q: "______ Bruce's mother wanted him to cut his long hair, but now she accepts his style.", 
    ans: "At first", 
    dummy: ["At last", "Right now", "A lot"], 
    note: "accept = 受け入れる" 
  },
  { 
    q: "Keita moved to the city when he started university. Now he lives ______ from his parents' house.", 
    ans: "far away", 
    dummy: ["after school", "over there", "at home"], 
    note: "Keita's hometown is not near his university." 
  },
  { 
    q: "Keita moved to a small apartment this spring. He lives alone, so he cooks and cleans ______.", 
    ans: "by himself", 
    dummy: ["after school", "a lot", "right now"], 
    note: "" 
  },
  { 
    q: "Brian: “Where are you?” <br>Rebecca: “I’m ______. I'm baking some cookies. Why don't you come over?”", 
    ans: "at home", 
    dummy: ["by oneself", "on the way", "at last"], 
    note: "" 
  },
  { 
    q: "Matt always worries about his looks, but Bruce is different. Bruce has very long hair and messy clothes, but he doesn't care about his appearance ______.", 
    ans: "at all", 
    dummy: ["a lot", "at last", "a little"], 
    note: "appearance = 外見" 
  },
  { 
    q: "______! Veronica can now recite all the names of the American presidents without looking at her book.", 
    ans: "At last", 
    dummy: ["At first", "On the way", "A little"], 
    note: "recite = 暗唱する" 
  },
  { 
    q: "Erica is ______ tired today after her long work as a lawyer. She doesn't feel like cooking, so she wants to go out for dinner.", 
    ans: "a little", 
    dummy: ["all day", "right now", "on the way"], 
    note: "lawyer = 弁護士" 
  },
  { 
    q: "Timothy fell in love with the puppy when he saw it ______.", 
    ans: "for the first time", 
    dummy: ["at first", "at all", "over there"], 
    note: "" 
  },
  { 
    q: "Daniel was late for Gilbert's wedding ceremony because he got lost ______ to the church.", 
    ans: "on the way", 
    dummy: ["around the world", "all over the world", "all day"], 
    note: "" 
  },
  { 
    q: "Mr. Noble is an IT company president. He flies ______ to meet his business partners in many different countries.", 
    ans: "around the world", 
    dummy: ["after school", "by oneself", "for the first time"], 
    note: "fly = 飛行機で移動する" 
  },
  { 
    q: "Mr. Sterling felt sick after eating a huge steak and three desserts, but he felt ______ better after resting on a sofa for three hours.", 
    ans: "a lot", 
    dummy: ["at all", "at first", "far away"], 
    note: "" 
  },
  { 
    q: "Yuriko's mother got angry because Yuriko was watching comedy shows on TV ______ instead of doing her homework.", 
    ans: "all day", 
    dummy: ["at last", "right now", "by oneself"], 
    note: "instead of 〜ing = 〜する代わりに" 
  },
  { 
    q: "“I’m sorry, but Mr. Noble is out ______,” the secretary said on the phone. “Please call back later.”", 
    ans: "right now", 
    dummy: ["at all", "at first", "on the way"], 
    note: "" 
  }
];

let quizData = [...quizDataRaw].sort(() => Math.random() - 0.5);
let currentIdx = 0;
let canClick = true;

function renderQuestion() {
  const item = quizData[currentIdx];
  document.getElementById('current-idx').innerText = currentIdx + 1;
  document.getElementById('q-text').innerHTML = (currentIdx + 1) + ". " + item.q.replace('______', `<span class="blank-space" id="blank-target">______</span>`);
  document.getElementById('q-hint').innerText = item.note ? `Hint: ${item.note}` : "";
  
  const options = [...item.dummy, item.ans].sort(() => Math.random() - 0.5);
  const optionsDiv = document.getElementById('q-options');
  optionsDiv.innerHTML = '';
  
  canClick = true;
  document.getElementById('feedback').innerText = '';
  document.getElementById('next-btn').style.display = 'none';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt, item.ans);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(btn, selected, correct) {
  if (!canClick || btn.classList.contains('selected-wrong')) return;
  if (selected === correct) {
    canClick = false;
    btn.classList.add('selected-correct');
    document.getElementById('blank-target').innerText = selected;
    document.getElementById('feedback').innerHTML = '<span style="color:var(--success)">Correct! ✨</span>';
    document.getElementById('next-btn').style.display = 'block';
  } else {
    btn.classList.add('selected-wrong');
    document.getElementById('feedback').innerHTML = '<span style="color:var(--error)">Wrong... Try again! ✍️</span>';
  }
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < quizData.length) {
    renderQuestion();
  } else {
    document.querySelector('.quiz-area').innerHTML = "<h2 style='text-align:center; color:var(--primary); margin-top:50px;'>Wonderful!<br>You finished Day 39!</h2>";
    document.getElementById('feedback').innerText = "";
    document.getElementById('next-btn').style.display = 'none';
  }
}

function renderPrintList() {
  const list1 = document.getElementById('print-list-1');
  const list2 = document.getElementById('print-list-2');
  const notesDiv = document.getElementById('print-notes');
  const uniqueNotes = new Set();
  
  quizData.forEach((item, i) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'print-question';
    const choices = [item.ans, ...item.dummy].sort(() => Math.random() - 0.5).join('  /  ');
    const displayQ = item.q.replace('______', `<span class="print-blank"></span>`);
    qDiv.innerHTML = `${i + 1}. ${displayQ}<div class="print-options-list">[ ${choices} ]</div>`;
    
    if (i < 8) list1.appendChild(qDiv);
    else list2.appendChild(qDiv);

    if (item.note) {
      item.note.split(' / ').forEach(n => {
        if (n && n.includes(' = ')) uniqueNotes.add(n);
      });
    }
  });

  Array.from(uniqueNotes).sort().forEach(n => {
    const parts = n.split(' = ');
    const itemDiv = document.createElement('div');
    itemDiv.className = 'notes-item';
    itemDiv.innerHTML = `<b>${parts[0]}</b> = ${parts[1]}`;
    notesDiv.appendChild(itemDiv);
  });
}

renderQuestion();
renderPrintList();
</script>
</body>
</html>
